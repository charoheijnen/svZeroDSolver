# This workflow uses Cypress for end-to-end testing of the 0D model GUI.

name: GUI-tests

on: [push, pull_request]

jobs:
  cypress-run:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: tests/cypress
        run: npm install

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Flask dependencies
        # The GUI only needs Flask, not the compiled pysvzerod extension.
        run: uv sync --no-install-project --group gui

      - name: Start Flask Application
        run: |
          cd applications/svZeroDGUI
          uv run --no-sync flask run --host=0.0.0.0 --port=8902 &
        env:
          FLASK_APP: app.py
          FLASK_ENV: development

      - name: Run Cypress tests
        uses: cypress-io/github-action@v5
        with:
          start: npm start
          working-directory: tests/cypress
